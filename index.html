<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <meta
      name="description"
      content="A beginner weather application built with HTML, CSS, and JavaScript."
    />

    <title>Weather App</title>

    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>

  <body>
    <main class="app-container">
      <section class="weather-app">
        <header class="app-header">
          <p class="eyebrow">Current Conditions</p>
          <h1>Weather App</h1>
          <p class="subtitle">
            Search for a city to view its weather.
          </p>
        </header>

        <form id="search-form" class="search-form">
          <label class="visually-hidden" for="city-input">
            City name
          </label>

          <input
            id="city-input"
            name="city"
            type="text"
            placeholder="Enter a city..."
            autocomplete="off"
          />

          <button id="search-button" type="submit">
            Search
          </button>
        </form>

        <p
          id="status-message"
          class="status-message"
          role="status"
          aria-live="polite"
        >
          Search for a city to view its weather.
        </p>

        <article id="weather-card" class="weather-card hidden">
          <div class="weather-card-header">
            <div>
              <p id="location-country" class="country-name">
                United States
              </p>

              <h2 id="city-name">Dallas</h2>
            </div>

            <div class="unit-toggle" aria-label="Temperature unit">
              <button
                id="celsius-button"
                class="unit-button active"
                type="button"
              >
                °C
              </button>

              <button
                id="fahrenheit-button"
                class="unit-button"
                type="button"
              >
                °F
              </button>
            </div>
          </div>

          <div class="main-weather">
            <div
              id="weather-icon"
              class="weather-icon"
              aria-hidden="true"
            >
              ☀️
            </div>

            <div>
              <p id="temperature" class="temperature">22°C</p>
              <p id="weather-description" class="weather-description">
                Clear sky
              </p>
            </div>
          </div>

          <div class="weather-details">
            <div class="detail-card">
              <span class="detail-icon" aria-hidden="true">💧</span>

              <div>
                <p class="detail-label">Humidity</p>
                <p id="humidity" class="detail-value">45%</p>
              </div>
            </div>

            <div class="detail-card">
              <span class="detail-icon" aria-hidden="true">💨</span>

              <div>
                <p class="detail-label">Wind</p>
                <p id="wind-speed" class="detail-value">8 mph</p>
              </div>
            </div>
          </div>

          <p class="demo-notice">
            This is placeholder data. A real weather API will be connected
            during the next phase.
          </p>
        </article>
      </section>
    </main>
  </body>
</html>
